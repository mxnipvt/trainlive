<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveTrack London</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05080f;
  --bg2:#080d1a;
  --panel:rgba(6,11,24,0.92);
  --panel2:rgba(8,14,28,0.88);
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --amber3:#fde68a;
  --cyan:#22d3ee;
  --cyan2:#06b6d4;
  --red:#ef4444;
  --green:#10b981;
  --blue:#3b82f6;
  --border:rgba(245,158,11,0.18);
  --border2:rgba(245,158,11,0.35);
  --text:#e8e0cc;
  --text2:#a09070;
  --text3:#60503a;
  --glow-amber:0 0 20px rgba(245,158,11,0.4);
  --glow-cyan:0 0 20px rgba(34,211,238,0.3);
  --ff-display:'Bebas Neue',sans-serif;
  --ff-ui:'Rajdhani',sans-serif;
  --ff-mono:'JetBrains Mono',monospace;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff-ui);cursor:none}

/* CUSTOM CURSOR */
#cursor{position:fixed;width:14px;height:14px;border-radius:50%;background:var(--amber);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width 0.15s,height 0.15s,background 0.15s;mix-blend-mode:difference}
#cursor-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid var(--amber);pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all 0.08s linear;opacity:0.6}
body:has(button:hover) #cursor{width:22px;height:22px;background:var(--cyan)}
body:has(input:focus) #cursor{background:var(--cyan);width:4px;height:20px;border-radius:2px}

/* SCAN LINE OVERLAY */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999;animation:scanMove 8s linear infinite}
@keyframes scanMove{0%{background-position:0 0}100%{background-position:0 100px}}

/* NOISE TEXTURE */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:0.6}

/* KEYFRAMES */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(245,158,11,0.2)}50%{box-shadow:0 0 30px rgba(245,158,11,0.5),0 0 60px rgba(245,158,11,0.2)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0) translateY(20px);opacity:0}70%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.5}}
@keyframes lineGrow{from{width:0}to{width:100%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes cornerBlink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ═══════════════════════════════ LOGIN PAGE ═══════════════════════════════ */
#loginPage{
  position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:var(--bg);overflow:hidden;
}
.login-bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(245,158,11,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,158,11,0.05) 1px,transparent 1px);
  background-size:60px 60px;
  animation:fadeUp 1s ease both;
}
.login-bg-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(120px)}
.login-card{
  position:relative;z-index:5;
  width:460px;padding:50px 44px;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:4px;
  box-shadow:0 40px 80px rgba(0,0,0,0.8),inset 0 1px 0 rgba(245,158,11,0.1);
  animation:fadeUp 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
}
/* Corner brackets */
.login-card::before,.login-card::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--amber);border-style:solid;animation:cornerBlink 2s infinite}
.login-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.login-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

.login-logo{margin-bottom:32px}
.login-logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--amber),#b45309);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;box-shadow:var(--glow-amber);animation:float 3s ease infinite}
.login-wordmark{font-family:var(--ff-display);font-size:42px;letter-spacing:3px;color:var(--amber);line-height:1}
.login-sub{font-family:var(--ff-mono);font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:4px}

.login-mode{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--border2);border-radius:3px;overflow:hidden}
.mode-btn{flex:1;padding:11px;border:none;background:transparent;color:var(--text2);font-family:var(--ff-ui);font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;transition:all 0.2s;text-transform:uppercase}
.mode-btn.active{background:var(--amber);color:#000;font-weight:700}

.field-wrap{position:relative;margin-bottom:16px}
.field-label{font-family:var(--ff-mono);font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:7px;display:block}
.field-input{
  width:100%;padding:13px 16px 13px 44px;
  background:rgba(245,158,11,0.04);
  border:1px solid var(--border);
  border-radius:3px;color:var(--text);
  font-family:var(--ff-ui);font-size:15px;font-weight:500;
  outline:none;transition:all 0.2s;
  letter-spacing:0.5px;
}
.field-input:focus{border-color:var(--amber);background:rgba(245,158,11,0.08);box-shadow:0 0 0 3px rgba(245,158,11,0.1)}
.field-input::placeholder{color:var(--text3)}
.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;margin-top:13px}

.btn-login{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,var(--amber),#b45309);
  border:none;border-radius:3px;
  color:#000;font-family:var(--ff-display);font-size:22px;letter-spacing:3px;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 6px 24px rgba(245,158,11,0.3);
  position:relative;overflow:hidden;
}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:opacity 0.2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(245,158,11,0.45)}
.btn-login:hover::before{opacity:1}
.btn-login:active{transform:translateY(0)}

.login-divider{display:flex;align-items:center;gap:14px;margin:20px 0;color:var(--text3);font-size:12px;font-family:var(--ff-mono);letter-spacing:1px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}

.social-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-social{
  padding:11px;background:transparent;border:1px solid var(--border);border-radius:3px;
  color:var(--text2);font-family:var(--ff-ui);font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;
  letter-spacing:0.5px;
}
.btn-social:hover{border-color:var(--amber2);color:var(--amber2);background:rgba(245,158,11,0.06)}

.login-footer{margin-top:22px;text-align:center;font-family:var(--ff-mono);font-size:11px;color:var(--text3)}
.login-footer a{color:var(--amber);text-decoration:none;cursor:pointer}
.login-footer a:hover{color:var(--amber2)}

/* ═══════════════════════════════ MAIN APP ═══════════════════════════════ */
#app{position:fixed;inset:0;display:none;flex-direction:column}

/* MAP */
#map{position:absolute;inset:0;z-index:0}
.leaflet-tile{filter:brightness(0.42) saturate(0.5) hue-rotate(180deg) invert(0.05)}
.leaflet-container{background:#05080f}
.leaflet-routing-container{display:none}

/* TOP BAR */
.topbar{
  position:absolute;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;
  background:linear-gradient(to bottom,rgba(5,8,15,0.95) 0%,transparent 100%);
  pointer-events:none;
}
.topbar>*{pointer-events:all}

.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--amber),#b45309);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--glow-amber)}
.brand-name{font-family:var(--ff-display);font-size:28px;letter-spacing:3px;color:var(--amber)}

.search-wrap{flex:1;max-width:500px;position:relative}
.main-search{
  width:100%;padding:13px 46px 13px 16px;
  background:var(--panel);
  border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:var(--ff-ui);font-size:15px;font-weight:500;
  outline:none;transition:all 0.2s;
  backdrop-filter:blur(20px);
  letter-spacing:0.5px;
}
.main-search:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,158,11,0.15),0 8px 30px rgba(0,0,0,0.5)}
.main-search::placeholder{color:var(--text3)}
.search-go{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:var(--amber);border:none;border-radius:2px;padding:5px 10px;
  color:#000;font-family:var(--ff-mono);font-size:11px;font-weight:500;cursor:pointer;letter-spacing:1px;
}

.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}

.top-btn{
  width:40px;height:40px;background:var(--panel);border:1px solid var(--border);border-radius:3px;
  color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;backdrop-filter:blur(10px);
}
.top-btn:hover{border-color:var(--amber);color:var(--amber);box-shadow:var(--glow-amber)}
.top-btn.active{border-color:var(--amber);background:rgba(245,158,11,0.1);color:var(--amber)}

.avatar{
  width:40px;height:40px;background:linear-gradient(135deg,var(--amber),#b45309);border-radius:3px;
  display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:17px;
  color:#000;cursor:pointer;letter-spacing:1px;box-shadow:var(--glow-amber);flex-shrink:0;
}

/* AUTOCOMPLETE */
.autocomplete-box{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--panel);border:1px solid var(--border2);border-radius:3px;
  backdrop-filter:blur(30px);overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.8);z-index:600;display:none;
}
.ac-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  cursor:pointer;border-bottom:1px solid rgba(245,158,11,0.06);
  transition:all 0.15s;
}
.ac-item:hover,.ac-item.hovered{background:rgba(245,158,11,0.08);border-left:2px solid var(--amber)}
.ac-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.ac-name{font-size:14px;font-weight:600;color:var(--text)}
.ac-meta{font-size:11px;color:var(--text3);font-family:var(--ff-mono);margin-top:2px}

/* ═══════ LEFT PANEL ═══════ */
.left-panel{
  position:absolute;left:20px;top:80px;bottom:20px;
  width:330px;z-index:400;display:flex;flex-direction:column;gap:10px;
  animation:slideLeft 0.5s cubic-bezier(0.22,1,0.36,1) both;
  pointer-events:none;
}
.left-panel>*{pointer-events:all}

.panel-card{
  background:var(--panel);border:1px solid var(--border);border-radius:4px;
  padding:18px;backdrop-filter:blur(24px);
  box-shadow:0 12px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(245,158,11,0.06);
  position:relative;overflow:hidden;
}
.panel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent);opacity:0.4}

.panel-title{
  font-family:var(--ff-display);font-size:18px;letter-spacing:2px;color:var(--amber);
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
.live-badge{
  display:flex;align-items:center;gap:5px;
  font-family:var(--ff-mono);font-size:10px;color:var(--red);letter-spacing:1px;font-weight:500;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1s infinite}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:14px}
.cat-tab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--text3);font-family:var(--ff-mono);font-size:9px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase;text-align:center}
.cat-tab.active{background:var(--amber);color:#000;font-weight:700}

/* CATEGORY ICONS */
.cat-icons{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.cat-icon-btn{
  padding:10px 6px;background:rgba(245,158,11,0.04);border:1px solid var(--border);border-radius:3px;
  cursor:pointer;text-align:center;transition:all 0.2s;
}
.cat-icon-btn:hover,.cat-icon-btn.active{background:rgba(245,158,11,0.12);border-color:var(--amber2)}
.cat-icon-btn .icon{font-size:18px;display:block;margin-bottom:4px}
.cat-icon-btn .lbl{font-family:var(--ff-mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.cat-icon-btn.active .lbl{color:var(--amber)}

/* DESTINATION LIST */
.dest-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.dest-list::-webkit-scrollbar{width:2px}
.dest-list::-webkit-scrollbar-thumb{background:var(--amber);border-radius:2px}
.dest-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border:1px solid transparent;border-radius:3px;cursor:pointer;transition:all 0.18s;
}
.dest-item:hover{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.2);transform:translateX(4px)}
.dest-item .emoji{font-size:16px;flex-shrink:0;width:22px}
.dest-item .dname{font-size:13px;font-weight:600;color:var(--text);flex:1}
.dest-item .dist{font-family:var(--ff-mono);font-size:10px;color:var(--amber)}

/* ROUTE INFO */
.route-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.rstat{background:rgba(245,158,11,0.05);border:1px solid var(--border);border-radius:3px;padding:10px;text-align:center}
.rstat-val{font-family:var(--ff-display);font-size:24px;letter-spacing:1px;color:var(--amber)}
.rstat-key{font-family:var(--ff-mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.step-list{display:flex;flex-direction:column;gap:5px;max-height:170px;overflow-y:auto}
.step-list::-webkit-scrollbar{width:2px}
.step-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.step-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:3px;transition:background 0.15s;
}
.step-item.active{background:rgba(245,158,11,0.08);border-left:2px solid var(--amber)}
.step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700}
.step-text{flex:1}
.step-action{font-size:12px;font-weight:600;color:var(--text)}
.step-dist{font-family:var(--ff-mono);font-size:10px;color:var(--text3);margin-top:1px}

/* BTN PRIMARY */
.btn-primary{
  width:100%;padding:13px;background:linear-gradient(135deg,var(--amber),#b45309);
  border:none;border-radius:3px;color:#000;
  font-family:var(--ff-display);font-size:18px;letter-spacing:2px;cursor:pointer;
  transition:all 0.2s;box-shadow:0 6px 20px rgba(245,158,11,0.3);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(245,158,11,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary.secondary{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:14px;letter-spacing:1px;box-shadow:none}
.btn-primary.secondary:hover{border-color:var(--amber);color:var(--amber)}

/* ═══════ RIGHT PANEL ═══════ */
.right-panel{
  position:absolute;right:20px;top:80px;bottom:20px;
  width:300px;z-index:400;display:flex;flex-direction:column;gap:10px;
  animation:slideRight 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  pointer-events:none;
}
.right-panel>*{pointer-events:all}

/* COMMENT FEED */
.comment-feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;max-height:300px}
.comment-feed::-webkit-scrollbar{width:2px}
.comment-feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.comment-card{
  background:rgba(245,158,11,0.04);border:1px solid var(--border);border-radius:3px;
  padding:10px 12px;animation:fadeUp 0.3s ease;
}
.comment-card.incident{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.05)}
.comment-card.police{border-color:rgba(34,211,238,0.3);background:rgba(34,211,238,0.05)}
.comment-card.hazard{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05)}
.comment-card.construction{border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.04)}
.comment-card.clear{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.04)}

.c-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.c-author{font-size:12px;font-weight:700;color:var(--amber)}
.c-time{font-family:var(--ff-mono);font-size:10px;color:var(--text3)}
.c-loc{font-family:var(--ff-mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.c-body{font-size:13px;color:var(--text2);line-height:1.4}

/* COMMENT INPUT */
.comment-input-area{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.type-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.type-chip{
  padding:4px 8px;border-radius:2px;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-family:var(--ff-mono);font-size:10px;
  cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;
}
.type-chip.active{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,0.1)}
.c-input{
  width:100%;padding:9px 12px;background:rgba(245,158,11,0.04);border:1px solid var(--border);
  border-radius:3px;color:var(--text);font-family:var(--ff-ui);font-size:13px;
  outline:none;resize:none;transition:all 0.2s;
}
.c-input:focus{border-color:var(--amber)}
.c-input::placeholder{color:var(--text3)}
.c-send{
  width:100%;margin-top:6px;padding:9px;background:var(--amber);border:none;border-radius:3px;
  color:#000;font-family:var(--ff-display);font-size:15px;letter-spacing:2px;cursor:pointer;
  transition:all 0.2s;
}
.c-send:hover{background:var(--amber2)}

/* ═══════ INCIDENT BAR ═══════ */
.incident-bar{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:500;display:flex;align-items:center;gap:6px;
  background:var(--panel);border:1px solid var(--border2);border-radius:4px;
  padding:10px 16px;backdrop-filter:blur(24px);
  box-shadow:0 12px 40px rgba(0,0,0,0.7),var(--glow-amber);
  animation:fadeUp 0.5s 0.3s both;
}
.bar-label{font-family:var(--ff-mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-right:6px;white-space:nowrap}
.bar-sep{width:1px;height:32px;background:var(--border);margin:0 4px}

.inc-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 12px;border-radius:3px;border:1px solid transparent;
  cursor:pointer;background:transparent;font-family:var(--ff-mono);
  font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;
  transition:all 0.2s;
}
.inc-btn .inc-emoji{font-size:20px}
.inc-btn:hover{background:rgba(245,158,11,0.08);border-color:var(--border2);color:var(--amber);transform:translateY(-3px)}
.inc-btn.accident:hover{border-color:rgba(239,68,68,0.5);color:var(--red);background:rgba(239,68,68,0.07)}
.inc-btn.police:hover{border-color:rgba(34,211,238,0.5);color:var(--cyan);background:rgba(34,211,238,0.07)}
.inc-btn.hazard:hover{border-color:rgba(245,158,11,0.5);color:var(--amber);background:rgba(245,158,11,0.07)}
.inc-btn.clear:hover{border-color:rgba(16,185,129,0.5);color:var(--green);background:rgba(16,185,129,0.07)}
.inc-btn:active{transform:scale(0.92) translateY(0)}

/* ═══════ MAP CONTROLS ═══════ */
.map-controls{
  position:absolute;right:340px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:8px;z-index:400;
}
.mc-btn{
  width:40px;height:40px;background:var(--panel);border:1px solid var(--border);border-radius:3px;
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  backdrop-filter:blur(10px);
}
.mc-btn:hover{border-color:var(--amber);color:var(--amber);box-shadow:var(--glow-amber)}

/* ═══════ TICKER ═══════ */
.ticker-wrap{
  position:absolute;bottom:0;left:0;right:0;height:32px;z-index:400;
  background:rgba(5,8,15,0.9);border-top:1px solid var(--border);
  display:flex;align-items:center;overflow:hidden;
}
.ticker-tag{
  flex-shrink:0;padding:0 16px;height:100%;display:flex;align-items:center;
  background:var(--amber);font-family:var(--ff-display);font-size:13px;letter-spacing:2px;color:#000;
}
.ticker-inner{display:flex;animation:ticker 30s linear infinite;white-space:nowrap}
.ticker-item{font-family:var(--ff-mono);font-size:11px;color:var(--text3);padding:0 30px;letter-spacing:1px}
.ticker-item span{color:var(--amber);margin-right:6px}

/* ═══════ NOTIFICATIONS ═══════ */
.notif{
  position:fixed;top:90px;left:50%;transform:translateX(-50%);
  z-index:9000;background:var(--panel);border:1px solid var(--amber);border-radius:3px;
  padding:13px 20px;display:flex;align-items:center;gap:12px;min-width:320px;
  backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,0.8),var(--glow-amber);
  animation:fadeUp 0.4s ease;
}
.notif-emoji{font-size:22px}
.notif-title{font-weight:700;font-size:14px;color:var(--amber)}
.notif-body{font-size:12px;color:var(--text3);margin-top:2px}
.notif-close{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px}
.notif-close:hover{color:var(--text)}

/* ═══════ INCIDENT PINS ═══════ */
.inc-pin{font-size:22px;cursor:pointer;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);text-shadow:0 2px 8px rgba(0,0,0,0.8);line-height:1}

/* ═══════ COMPASS ═══════ */
.compass{
  position:absolute;left:360px;bottom:50px;z-index:400;
  width:60px;height:60px;
  background:var(--panel);border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff-display);font-size:11px;letter-spacing:1px;
  box-shadow:var(--glow-amber);
}
.compass-n{color:var(--red);font-size:13px}
.compass-s,.compass-e,.compass-w{color:var(--text3);font-size:10px;position:absolute}
.compass-n-w{position:absolute;top:8px;left:50%;transform:translateX(-50%)}
.compass-s-w{position:absolute;bottom:8px;left:50%;transform:translateX(-50%)}
.compass-e-w{position:absolute;right:8px;top:50%;transform:translateY(-50%)}
.compass-w-w{position:absolute;left:8px;top:50%;transform:translateY(-50%)}
.compass-needle{position:absolute;width:2px;height:18px;background:linear-gradient(to bottom,var(--red) 50%,rgba(255,255,255,0.3) 50%);border-radius:2px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(0deg);transform-origin:center}

/* ═══════ STATS HUD ═══════ */
.hud{
  position:absolute;left:360px;top:90px;z-index:400;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
}
.hud-item{
  background:var(--panel);border:1px solid var(--border);border-radius:3px;
  padding:8px 14px;backdrop-filter:blur(10px);
  font-family:var(--ff-mono);font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:8px;
}
.hud-item .hv{color:var(--amber);font-size:14px;font-weight:500}

/* ═══════ LOADING SPINNER ═══════ */
.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(245,158,11,0.3);border-top-color:var(--amber);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}

/* ROUTE LINE override */
.leaflet-interactive{stroke:var(--amber) !important;stroke-width:4 !important}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--amber)}
</style>

function handleSearch(input) {
  const q = input.value.toLowerCase().trim();
  const box = document.getElementById('acBox');
  const hint = document.getElementById('searchHint');
  const results = document.getElementById('searchResults');

  if (q.length < 2) {
    box.style.display = 'none';
    if (activeCatTab==='search') { hint.style.display='block'; results.style.display='none'; }
    return;
  }

  const matches = allDests.filter(d => d.name.toLowerCase().includes(q)).slice(0,8);

  if (matches.length) {
    box.innerHTML = matches.map((d,i) => `
      <div class="ac-item" data-idx="${i}" onmouseenter="hoverAC(this)" onclick="selectDest('${d.name}',${d.coords[0]},${d.coords[1]})">
        <span class="ac-icon">${d.icon}</span>
        <div>
          <div class="ac-name">${d.name}</div>
          <div class="ac-meta">${d.cat.toUpperCase()} · ${getDistStr(d.coords)}</div>
        </div>
      </div>
    `).join('');
    box.style.display = 'block';
  } else {
    box.innerHTML = '<div class="ac-item"><span class="ac-icon">🔍</span><div><div class="ac-name" style="color:var(--text3)">No results found</div></div></div>';
    box.style.display = 'block';
  }

  // Also update search sub-tab
  if (activeCatTab==='search') {
    hint.style.display='none';
    renderDestList('searchResults', matches);
    results.style.display='block';
  }
}

function hoverAC(el) {
  document.querySelectorAll('.ac-item').forEach(e=>e.classList.remove('hovered'));
  el.classList.add('hovered');
}

function selectDest(name, lat, lng) {
  selectedDest = {name, coords:[lat,lng]};
  document.getElementById('mainSearch').value = name;
  document.getElementById('acBox').style.display = 'none';
  map.flyTo([lat,lng], 15, {duration:1.4});
  notify('📍','Destination Set',name,'#f59e0b');
}

function getDistStr(coords) {
  const R = 6371;
  const dLat = (coords[0]-currentLatLng[0])*Math.PI/180;
  const dLng = (coords[1]-currentLatLng[1])*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(currentLatLng[0]*Math.PI/180)*Math.cos(coords[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return d < 1 ? `${Math.round(d*1000)}m away` : `${d.toFixed(1)}km away`;
}

document.addEventListener('click', e => {

function getDirections() {
  const dest = selectedDest;
  if (!dest) { notify('⚠️','No Destination','Please search and select a destination first','#ef4444'); return; }

  if (routeControl) map.removeControl(routeControl);

  routeControl = L.Routing.control({
    waypoints: [L.latLng(currentLatLng), L.latLng(dest.coords[0], dest.coords[1])],
    routeWhileDragging: false,
    addWaypoints: false,
    lineOptions: {
      styles: [{color:'#f59e0b', opacity:0.9, weight:5}]
    },
    createMarker: () => null,
  }).addTo(map);

  routeControl.on('routesfound', e => {
    const route = e.routes[0];
    const mins = Math.round(route.summary.totalTime/60);
    const km = (route.summary.totalDistance/1000).toFixed(1);
    routeActive = true;
    showRouteCard(dest.name, mins, km, route.instructions || []);
    notify('🧭','Route Calculated',`${km} km · ~${mins} min to ${dest.name}`,'#f59e0b');
  });
}

function showRouteCard(dest, mins, km, instructions) {
  const card = document.getElementById('routeCard');
  card.style.display = 'block';
  document.getElementById('routeStats').innerHTML = `
    <div class="rstat"><div class="rstat-val">${mins}</div><div class="rstat-key">Minutes</div></div>
    <div class="rstat"><div class="rstat-val">${km}</div><div class="rstat-key">km</div></div>
    <div class="rstat"><div class="rstat-val" style="color:var(--green)">GO</div><div class="rstat-key">Status</div></div>
  `;
  const steps = instructions.slice(0,6).map((ins,i) => `
    <div class="step-item ${i===0?'active':''}">
      <div class="step-icon" style="background:rgba(245,158,11,0.1);color:var(--amber)">${getDirectionArrow(ins.type)}</div>
      <div class="step-text">
        <div class="step-action">${ins.text||'Continue'}</div>
        <div class="step-dist">${ins.distance?Math.round(ins.distance)+'m':''}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('stepList').innerHTML = steps || '<div style="font-family:var(--ff-mono);font-size:11px;color:var(--text3);padding:10px">Route loaded</div>';
}

function getDirectionArrow(type) {
  const arrows = {Left:'↰',Right:'↱',SlightLeft:'↖',SlightRight:'↗',SharpLeft:'⬅',SharpRight:'➡',Straight:'↑',Destination:'◎',WaypointReached:'⬤'};
  return arrows[type] || '↑';
}

function clearRoute() {

function addIncident(type) {
  const emojis={accident:'🚨',police:'🚔',hazard:'⚠️',construction:'🚧',traffic:'🚗',clear:'✅',camera:'📷',closure:'🚫'};
  const msgs={
    accident:['Accident reported!','Collision on the road','Vehicles involved'],
    police:['Police spotted','Speed check ahead','Officers directing traffic'],
    hazard:['Hazard on the road','Debris spotted','Slippery surface warning'],
    construction:['Roadworks active','Lane closure ahead','Construction traffic'],
    traffic:['Heavy congestion','Traffic building','Slow-moving vehicles'],
    clear:['All clear!','Road flowing freely','No incidents here'],
    camera:['Speed camera spotted','Average speed zone','Mobile camera van'],
    closure:['Road closed','Diversion in place','No through road'],
  };
  const locs=['Near you','Junction ahead','Your current road','500m ahead','Next junction'];
  const msg = msgs[type][Math.floor(Math.random()*msgs[type].length)];
  const loc = locs[Math.floor(Math.random()*locs.length)];

  // Drop pin near user location
  const offset = () => (Math.random()-0.5)*0.008;
  const coords = [currentLatLng[0]+offset(), currentLatLng[1]+offset()];
  spawnPin(coords, type, emojis[type]);

  // Add comment
  const t = COMMENT_TYPES.find(t=>t.key===type)||{emoji:emojis[type],key:type};
  pushComment({author:'You',time:'just now',loc,text:msg,type:type==='accident'?'incident':type,emoji:emojis[type]});

  // Notify
  const colours={accident:'#ef4444',police:'#22d3ee',hazard:'#f59e0b',construction:'#fbbf24',traffic:'#f97316',clear:'#10b981',camera:'#8b5cf6',closure:'#ef4444'};
  notify(emojis[type], type.charAt(0).toUpperCase()+type.slice(1)+' Reported', `${msg} · ${loc}`, colours[type]||'#f59e0b');

  // Add to ticker
  const inner = document.getElementById('tickerInner');
  inner.innerHTML += `<span class="ticker-item"><span>${emojis[type]}</span> ${type.toUpperCase()}: ${msg} near your location</span>`;
}

}

// Apply dark tile filter after map loads
setTimeout(() => {
  document.querySelectorAll('.leaflet-tile').forEach(t => {
    t.style.filter = 'brightness(0.42) saturate(0.5) hue-rotate(180deg) invert(0.05)';
  });
  const obs = new MutationObserver(muts => {
    muts.forEach(m => m.addedNodes.forEach(n => {
      if (n.classList && n.classList.contains('leaflet-tile')) {
        n.style.filter = mapStyleDark ? 'brightness(0.42) saturate(0.5) hue-rotate(180deg) invert(0.05)' : 'brightness(0.75) saturate(0.8)';
      }
    }));
  });
  const tc = document.querySelector('.leaflet-tile-container');
  if (tc) obs.observe(tc, {childList:true, subtree:true});
}, 2000);
</script>
</body>
</html>
